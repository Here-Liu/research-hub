<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Consensus</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0; width: 1080px; height: 1440px; overflow: hidden;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  background: #fdf6ec; color: #261b12;
}
.page {
  position: relative; width: 1080px; height: 1440px; padding: 86px 70px 72px;
  background:
    linear-gradient(rgba(217,119,6,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,144,217,.055) 1px, transparent 1px),
    radial-gradient(circle at 16% 12%, rgba(255, 222, 158, .78), transparent 22%),
    radial-gradient(circle at 92% 82%, rgba(74,144,217,.16), transparent 24%),
    #fdf6ec;
  background-size: 42px 42px, 42px 42px, auto, auto, auto;
}
.page:before {
  content: ""; position: absolute; inset: 34px;
  border: 3px solid rgba(38,27,18,.72); border-radius: 26px;
  transform: rotate(-.35deg); pointer-events: none;
}
.tape {
  display: inline-block; padding: 14px 28px; margin-left: 6px;
  background: #d8ecff; color: #225f99; font-size: 38px; font-weight: 800;
  line-height: 1; transform: rotate(-2deg); box-shadow: 0 10px 0 rgba(74,144,217,.12);
}
h1 {
  margin: 74px 0 0; font-size: 138px; line-height: .98; font-weight: 950; letter-spacing: 0;
}
h1 span { color: #d97706; position: relative; display: inline-block; }
h1 span:after {
  content: ""; position: absolute; left: -10px; right: -10px; bottom: 8px;
  height: 24px; background: rgba(255, 107, 53, .2); z-index: -1; transform: rotate(-1deg);
}
.subtitle {
  width: 88%; margin-top: 38px; font-size: 42px; line-height: 1.22; font-weight: 700; color: #4b3a2a;
}
.chips {
  display: flex; flex-wrap: wrap; gap: 18px; margin-top: 50px;
}
.chips b {
  padding: 15px 22px 14px; border: 3px solid #4a90d9; border-radius: 999px;
  color: #225f99; background: rgba(255,255,255,.45); font-size: 30px; line-height: 1;
}
.meter {
  margin-top: 50px; display: flex; gap: 24px;
}
.meter > div {
  flex: 1; padding: 24px 16px; border-radius: 18px; text-align: center; font-weight: 800;
}
.meter .yes { background: #d4edda; border: 3px solid #28a745; color: #155724; }
.meter .pos { background: #fff3cd; border: 3px solid #ffc107; color: #856404; }
.meter .no  { background: #f8d7da; border: 3px solid #dc3545; color: #721c24; }
.meter .num { font-size: 42px; line-height: 1.1; }
.meter .lbl { font-size: 24px; margin-top: 4px; }
.bullets {
  margin-top: 42px; display: grid; gap: 18px;
}
.bullets p {
  margin: 0; padding: 22px 26px 22px 74px; min-height: 78px; position: relative;
  background: rgba(255,255,255,.58); border: 3px solid rgba(38,27,18,.72);
  border-radius: 18px; font-size: 34px; font-weight: 800; line-height: 1.14;
  box-shadow: 8px 8px 0 rgba(217,119,6,.14);
}
.bullets p:before {
  content: ""; position: absolute; left: 26px; top: 27px;
  width: 22px; height: 22px; border-radius: 50%;
  background: #d97706; box-shadow: 0 0 0 6px rgba(217,119,6,.16);
}
.doodles { position: absolute; inset: 0; pointer-events: none; }
.ring { position: absolute; width: 128px; height: 128px; border: 8px solid rgba(217,119,6,.26); border-radius: 50%; transform: rotate(-12deg); }
.ring.one { right: 112px; bottom: 158px; }
.ring.two { left: 112px; bottom: 96px; border-color: rgba(74,144,217,.24); width: 92px; height: 92px; }
.footer {
  position: absolute; left: 72px; bottom: 72px; right: 72px;
  display: flex; justify-content: space-between; align-items: center;
  color: #7b6048; font-size: 27px; font-weight: 800;
}
.number {
  position: absolute; right: 76px; top: 76px;
  width: 110px; height: 110px;
  transform: rotate(5deg);
}
.number img { width: 100%; height: 100%; object-fit: contain; display: block; }
.seal {
  padding: 12px 18px; border: 4px solid #d97706; color: #d97706;
  border-radius: 12px; transform: rotate(-3deg); background: rgba(255,255,255,.5);
}
</style>
</head>
<body>
<main class="page">
  <div class="tape">Consensus</div>
  <div class="number"><img src="consensus-icon.png" alt="Consensus"></div>
  <h1><div>问一个</div><div><span>研究问题</span></div><div>直接看答案</div></h1>
  <div class="subtitle">2.2 亿+ 论文 → AI 分析 → Yes / Possibly / No 证据分布</div>
  <div class="chips"><b>科研工具</b><b>证据分析</b><b>文献综述</b></div>

  <div class="doodles"><div class="ring one"></div><div class="ring two"></div></div>
  <div class="footer"><span>科研证据分析工作流</span><span class="seal">收藏备用</span></div>
</main>
</body>
</html>
