<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Research Rabbit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  background: #fdf6ec;
  color: #261b12;
}
.page {
  position: relative;
  width: 1080px;
  height: 1440px;
  padding: 86px 70px 72px;
  background:
    linear-gradient(rgba(217,119,6,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,144,217,.055) 1px, transparent 1px),
    radial-gradient(circle at 16% 12%, rgba(255, 222, 158, .78), transparent 22%),
    radial-gradient(circle at 92% 82%, rgba(74,144,217,.16), transparent 24%),
    #fdf6ec;
  background-size: 42px 42px, 42px 42px, auto, auto, auto;
}
.page:before {
  content: "";
  position: absolute;
  inset: 34px;
  border: 3px solid rgba(38,27,18,.72);
  border-radius: 26px;
  transform: rotate(-.35deg);
  pointer-events: none;
}
.tape {
  display: inline-block;
  padding: 14px 28px;
  margin-left: 6px;
  background: #d8ecff;
  color: #225f99;
  font-size: 38px;
  font-weight: 800;
  line-height: 1;
  transform: rotate(-2deg);
  box-shadow: 0 10px 0 rgba(74,144,217,.12);
}
.number {
  position: absolute;
  right: 74px;
  top: 76px;
  width: 170px;
  height: 170px;
  display: grid;
  place-items: center;
  transform: rotate(3deg);
}
.number img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
h1 {
  margin: 84px 0 0;
  font-size: 140px;
  line-height: .98;
  font-weight: 950;
  letter-spacing: 0;
}
h1 span {
  color: #d97706;
  position: relative;
  display: inline-block;
}
h1 span:after {
  content: "";
  position: absolute;
  left: -10px;
  right: -10px;
  bottom: 8px;
  height: 24px;
  background: rgba(255, 107, 53, .2);
  z-index: -1;
  transform: rotate(-1deg);
}
.subtitle {
  width: 88%;
  margin-top: 38px;
  font-size: 42px;
  line-height: 1.22;
  font-weight: 700;
  color: #4b3a2a;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 54px;
}
.chips b {
  padding: 15px 22px 14px;
  border: 3px solid #4a90d9;
  border-radius: 999px;
  color: #225f99;
  background: rgba(255,255,255,.45);
  font-size: 30px;
  line-height: 1;
}
.note {
  margin-top: 58px;
  padding: 26px 30px;
  border-left: 10px solid #d97706;
  background: rgba(255,255,255,.56);
  font-size: 34px;
  line-height: 1.36;
  font-weight: 700;
  color: #594432;
}
.bullets {
  margin-top: 56px;
  display: grid;
  gap: 20px;
}
.bullets p {
  margin: 0;
  padding: 24px 28px 24px 78px;
  min-height: 86px;
  position: relative;
  background: rgba(255,255,255,.58);
  border: 3px solid rgba(38,27,18,.72);
  border-radius: 18px;
  font-size: 36px;
  font-weight: 800;
  line-height: 1.14;
  box-shadow: 8px 8px 0 rgba(217,119,6,.14);
}
.bullets p:before {
  content: "";
  position: absolute;
  left: 27px;
  top: 31px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #d97706;
  box-shadow: 0 0 0 8px rgba(217,119,6,.16);
}
.doodles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.ring {
  position: absolute;
  width: 128px;
  height: 128px;
  border: 8px solid rgba(217,119,6,.26);
  border-radius: 50%;
  transform: rotate(-12deg);
}
.ring.one { right: 112px; bottom: 158px; }
.ring.two { left: 112px; bottom: 96px; border-color: rgba(74,144,217,.24); width: 92px; height: 92px; }
.footer {
  position: absolute;
  left: 72px;
  bottom: 72px;
  right: 72px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #7b6048;
  font-size: 27px;
  font-weight: 800;
}
.seal {
  padding: 12px 18px;
  border: 4px solid #d97706;
  color: #d97706;
  border-radius: 12px;
  transform: rotate(-3deg);
  background: rgba(255,255,255,.5);
}
</style>
</head>
<body>
<main class="page">
  <div class="tape">Research Rabbit</div>
  <div class="number"><img src="rr-logo.png" alt="RR"></div>
  <h1><div>别再用</div><div><span>关键词</span></div><div>找文献了</div></h1>
  <div class="subtitle">用引用网络发现你漏掉的关键论文</div>
  <div class="chips"><b>科研工具</b><b>文献发现</b><b>Zotero 工作流</b></div>
  <div class="doodles"><div class="ring one"></div><div class="ring two"></div></div>
  <div class="footer"><span>文献发现工作流</span><span class="seal">收藏备用</span></div>
</main>
</body>
</html>
