<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RR 界面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0; width: 1080px; height: 1440px; overflow: hidden;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  background: #fdf6ec; color: #261b12;
}
.page {
  position: relative; width: 1080px; height: 1440px; padding: 86px 70px 72px;
  background:
    linear-gradient(rgba(217,119,6,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,144,217,.055) 1px, transparent 1px),
    radial-gradient(circle at 16% 12%, rgba(255, 222, 158, .78), transparent 22%),
    radial-gradient(circle at 92% 82%, rgba(74,144,217,.16), transparent 24%),
    #fdf6ec;
  background-size: 42px 42px, 42px 42px, auto, auto, auto;
}
.page:before {
  content: ""; position: absolute; inset: 34px;
  border: 3px solid rgba(38,27,18,.72); border-radius: 26px;
  transform: rotate(-.35deg); pointer-events: none;
}
.tape {
  display: inline-block; padding: 14px 28px; margin-left: 6px;
  background: #d8ecff; color: #225f99; font-size: 38px; font-weight: 800;
  line-height: 1; transform: rotate(-2deg); box-shadow: 0 10px 0 rgba(74,144,217,.12);
}
.number {
  position: absolute; right: 84px; top: 86px;
  width: 98px; height: 98px; border-radius: 999px;
  border: 4px solid #d97706; color: #d97706;
  display: grid; place-items: center; font-size: 36px; font-weight: 900;
  transform: rotate(5deg); background: rgba(255,255,255,.38);
}
h2 {
  margin: 50px 0 0; font-size: 48px; line-height: 1.1; font-weight: 900;
}
h2 span { color: #d97706; }
.sub {
  margin-top: 14px; font-size: 28px; font-weight: 600; color: #4b3a2a;
}
.img-card {
  margin-top: 30px; width: 100%; border-radius: 18px;
  border: 4px solid #261b12; overflow: hidden;
  box-shadow: 10px 10px 0 rgba(74,144,217,.13);
}
.img-card img { width: 100%; height: auto; display: block; }
.img-card + .img-card { margin-top: 20px; }
.label {
  margin-top: 8px; font-size: 22px; color: #7b6048; font-weight: 600; text-align: center;
}
.footer {
  position: absolute; left: 72px; bottom: 72px; right: 72px;
  display: flex; justify-content: space-between; align-items: center;
  color: #7b6048; font-size: 27px; font-weight: 800;
}
.seal {
  padding: 12px 18px; border: 4px solid #d97706; color: #d97706;
  border-radius: 12px; transform: rotate(-3deg); background: rgba(255,255,255,.5);
}
.doodles { position: absolute; inset: 0; pointer-events: none; }
.ring { position: absolute; width: 100px; height: 100px; border: 6px solid rgba(217,119,6,.2); border-radius: 50%; }
.ring.a { right: 60px; bottom: 140px; width: 130px; height: 130px; border-color: rgba(74,144,217,.15); }
</style>
</head>
<body>
<main class="page">
  <div class="tape">Research Rabbit</div>
  <div class="number">02</div>
  <h2>真实界面长这样 <span>👀</span></h2>
  <div class="sub">引用网络一目了然，右上角是最值得关注的最新高影响力论文</div>
  
  <div class="img-card"><img src="rr-ui-map.webp" alt="RR 引用网络图谱"></div>
  <div class="img-card"><img src="rr-ui-topic.webp" alt="RR 主题探索"></div>

  <div class="doodles"><div class="ring a"></div></div>
  <div class="footer"><span>文献发现工作流 · 02</span><span class="seal">收藏备用</span></div>
</main>
</body>
</html>
